<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Card Roster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  if(localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
</script>
<style>
  :root{
    --bg:#0A0A0C; --surface:#141417; --surface-2:#1B1B20;
    --line: rgba(255,255,255,0.09); --line-strong: rgba(255,255,255,0.18);
    --text:#F5F5F7; --text-dim: rgba(245,245,247,0.56); --text-faint: rgba(245,245,247,0.34);
    --blue:#2E6BFF; --pink:#FF3D8A; --gold:#FFB020; --red:#FF3B3B;
  }
  [data-theme="light"]{
    --bg:#F5F5F7; --surface:#FFFFFF; --surface-2:#F0F0F2;
    --line: rgba(10,10,12,0.09); --line-strong: rgba(10,10,12,0.18);
    --text:#0A0A0C; --text-dim: rgba(10,10,12,0.56); --text-faint: rgba(10,10,12,0.36);
  }
  body{ transition: background-color 0.2s, color 0.2s; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    -webkit-font-smoothing:antialiased;
  }
  .card{
    width:100%; max-width:380px; background:var(--surface); border:1px solid var(--line);
    border-radius:16px; padding:32px 28px;
  }
  .brand{display:flex; align-items:center; gap:9px; margin-bottom:26px;}
  .brand .dot{width:9px; height:9px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--pink));}
  .brand span{font-family:'Instrument Serif', serif; font-style:italic; font-size:19px;}
  h1{
    font-family:'Instrument Serif', serif; font-style:italic; font-weight:400;
    font-size:32px; margin:0 0 6px;
    background:linear-gradient(100deg, var(--blue) 0%, var(--pink) 60%, var(--gold) 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub{color:var(--text-dim); font-size:13.5px; margin:0 0 24px;}
  .tabs{display:flex; gap:2px; background:var(--surface-2); border-radius:9px; padding:3px; margin-bottom:22px; border:1px solid var(--line);}
  .tabs button{
    flex:1; background:transparent; border:none; color:var(--text-dim); font-family:'Inter',sans-serif;
    font-size:13px; font-weight:600; padding:9px; border-radius:7px; cursor:pointer;
  }
  .tabs button.active{background:#222227; color:var(--text);}
  label{
    display:block; font-size:10.5px; letter-spacing:0.07em; text-transform:uppercase;
    color:var(--text-faint); margin-bottom:6px; font-weight:600;
  }
  input{
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:8px;
    color:var(--text); padding:11px 12px; font-size:14px; font-family:'Inter',sans-serif; margin-bottom:16px;
  }
  input:focus{outline:none; border-color:var(--line-strong);}
  .btn{
    width:100%; background:var(--text); color:var(--bg); border:none; border-radius:9px;
    padding:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .btn:hover{opacity:0.88;}
  .btn:disabled{opacity:0.5; cursor:default;}
  .error{
    color:var(--red); font-size:12.5px; margin:-6px 0 14px; display:none;
    font-family:'IBM Plex Mono',monospace;
  }
  .hint{color:var(--text-faint); font-size:11.5px; margin-top:16px; text-align:center; line-height:1.5;}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="dot"></span><span>Card Roster</span></div>
  <h1 id="heading">Bienvenido</h1>
  <p class="sub" id="subhead">Inicia sesión para ver tu colección.</p>

  <div class="tabs">
    <button id="tab-login" class="active">Iniciar sesión</button>
    <button id="tab-signup">Crear cuenta</button>
  </div>

  <form id="auth-form">
    <label>Email</label>
    <input type="email" id="email" required autocomplete="email">
    <label>Contraseña</label>
    <input type="password" id="password" required autocomplete="current-password">
    <p class="error" id="error-msg"></p>
    <button type="submit" class="btn" id="submit-btn">Iniciar sesión</button>
  </form>

  <p class="hint" id="hint-signup" style="display:none;">La contraseña debe tener al menos 8 caracteres.</p>
</div>

<script>
let mode = 'login';

function setMode(m){
  mode = m;
  document.getElementById('tab-login').classList.toggle('active', m==='login');
  document.getElementById('tab-signup').classList.toggle('active', m==='signup');
  document.getElementById('heading').textContent = m==='login' ? 'Bienvenido' : 'Crear cuenta';
  document.getElementById('subhead').textContent = m==='login'
    ? 'Inicia sesión para ver tu colección.'
    : 'Crea una cuenta para empezar a trackear tus cartas.';
  document.getElementById('submit-btn').textContent = m==='login' ? 'Iniciar sesión' : 'Crear cuenta';
  document.getElementById('password').autocomplete = m==='login' ? 'current-password' : 'new-password';
  document.getElementById('hint-signup').style.display = m==='signup' ? 'block' : 'none';
  document.getElementById('error-msg').style.display = 'none';
}
document.getElementById('tab-login').onclick = ()=>setMode('login');
document.getElementById('tab-signup').onclick = ()=>setMode('signup');

document.getElementById('auth-form').onsubmit = async (e)=>{
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error-msg');
  const btn = document.getElementById('submit-btn');
  errorEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Un momento…';

  try{
    const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/signup';
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if(!res.ok){
      errorEl.textContent = data.error || 'Algo salió mal.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = mode==='login' ? 'Iniciar sesión' : 'Crear cuenta';
      return;
    }
    window.location.href = '/index.html';
  }catch(err){
    errorEl.textContent = 'No se pudo conectar. Intenta de nuevo.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = mode==='login' ? 'Iniciar sesión' : 'Crear cuenta';
  }
};

// If already signed in, skip straight to the collection
fetch('/api/auth/me').then(r=>{ if(r.ok) window.location.href = '/index.html'; }).catch(()=>{});
</script>
</body>
</html>
